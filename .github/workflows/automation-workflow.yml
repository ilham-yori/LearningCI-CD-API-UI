name: QA Tests (API + Web)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run API tests
        env:
          BASE_URL: https://reqres.in
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
        run: ./gradlew runApiTests --no-daemon

      - name: Upload Cucumber HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: build/reports/cucumber/report.html
          retention-days: 14

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: build/test-results/runApiTests/
          retention-days: 14

  web-tests:
    runs-on: ubuntu-latest
    # Runs independently from api-tests so a flaky UI test doesn't block API results
    # (remove "needs" is already implicit - no dependency between the two jobs)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Web (Selenium) tests
        run: ./gradlew runWebTests --no-daemon

      - name: Upload Cucumber HTML report (web)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report-web
          path: target/cucumber-report/web.html
          retention-days: 14

      - name: Upload JUnit test results (web)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results-web
          path: build/test-results/runWebTests/
          retention-days: 14
